name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: social_app_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.4.4
        bundler-cache: true

    - name: Set up Node.js (for asset compilation)
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        gem install bundler
        bundle config path vendor/bundle
        bundle install --jobs 4 --retry 3

    - name: Set up database
      env:
        RAILS_ENV: test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/social_app_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        bundle exec rails db:create
        bundle exec rails db:schema:load

    - name: Run RuboCop
      run: bundle exec rubocop

    - name: Run RSpec with coverage
      env:
        RAILS_ENV: test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/social_app_test
        REDIS_URL: redis://localhost:6379/0
        COVERAGE: true
      run: bundle exec rspec --format progress

    - name: Upload coverage reports
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage/.resultset.json
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Check coverage for changed files
      env:
        RAILS_ENV: test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/social_app_test
        REDIS_URL: redis://localhost:6379/0
        COVERAGE: true
      run: |
        # Get list of changed Ruby files
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | grep '\.rb$' | grep '^app/' || true)
        else
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep '\.rb$' | grep '^app/' || true)
        fi
        
        if [ -z "$CHANGED_FILES" ]; then
          echo "No Ruby files changed in app/ directory"
          exit 0
        fi
        
        echo "Changed files: $CHANGED_FILES"
        
        # Run tests to generate coverage
        bundle exec rspec --format progress
        
        # Check coverage for each changed file
        MINIMUM_COVERAGE=70
        FAILED_FILES=()
        
        for file in $CHANGED_FILES; do
          echo "Checking coverage for $file"
          
          # Extract coverage data for this file
          COVERAGE_DATA=$(ruby -e "
            require 'json'
            data = JSON.parse(File.read('coverage/.resultset.json'))
            coverage = data['RSpec']['coverage']
            file_path = File.expand_path('$file')
            
            # Find matching file in coverage data
            matching_file = coverage.keys.find { |k| k.end_with?('$file') }
            
            if matching_file
              file_data = coverage[matching_file]
              lines = file_data['lines']
              total_lines = lines.count { |line| line != nil }
              covered_lines = lines.count { |line| line && line > 0 }
              percentage = total_lines > 0 ? (covered_lines.to_f / total_lines * 100).round(2) : 0
              puts \"#{percentage}:#{covered_lines}:#{total_lines}\"
            else
              puts '0:0:0'
            end
          ")
          
          COVERAGE_PERCENTAGE=$(echo $COVERAGE_DATA | cut -d: -f1)
          COVERED_LINES=$(echo $COVERAGE_DATA | cut -d: -f2)
          TOTAL_LINES=$(echo $COVERAGE_DATA | cut -d: -f3)
          
          echo "File: $file"
          echo "Coverage: $COVERAGE_PERCENTAGE% ($COVERED_LINES/$TOTAL_LINES lines)"
          
          if (( $(echo "$COVERAGE_PERCENTAGE < $MINIMUM_COVERAGE" | bc -l) )); then
            echo "❌ Coverage for $file is $COVERAGE_PERCENTAGE%, which is below the minimum of $MINIMUM_COVERAGE%"
            FAILED_FILES+=("$file")
          else
            echo "✅ Coverage for $file is $COVERAGE_PERCENTAGE%, which meets the minimum of $MINIMUM_COVERAGE%"
          fi
        done
        
        if [ ${#FAILED_FILES[@]} -gt 0 ]; then
          echo ""
          echo "❌ The following files have insufficient test coverage:"
          for file in "${FAILED_FILES[@]}"; do
            echo "  - $file"
          done
          echo ""
          echo "Please add tests to improve coverage for these files."
          exit 1
        else
          echo ""
          echo "✅ All changed files meet the minimum coverage requirement of $MINIMUM_COVERAGE%"
        fi

    - name: Comment coverage results on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          // Read coverage data
          let coverageData = {};
          try {
            const coverageFile = fs.readFileSync('coverage/.resultset.json', 'utf8');
            coverageData = JSON.parse(coverageFile);
          } catch (error) {
            console.log('Could not read coverage file');
            return;
          }
          
          // Get changed files
          const { data: files } = await github.rest.pulls.listFiles({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number
          });
          
          const changedRubyFiles = files
            .filter(file => file.filename.endsWith('.rb') && file.filename.startsWith('app/'))
            .map(file => file.filename);
          
          if (changedRubyFiles.length === 0) {
            console.log('No Ruby files changed in app/ directory');
            return;
          }
          
          // Generate coverage report
          let comment = '## 📊 Test Coverage Report\n\n';
          comment += '### Changed Files Coverage:\n\n';
          comment += '| File | Coverage | Status |\n';
          comment += '|------|----------|--------|\n';
          
          let allPassed = true;
          const coverage = coverageData.RSpec?.coverage || {};
          
          for (const file of changedRubyFiles) {
            const filePath = Object.keys(coverage).find(k => k.endsWith(file));
            let percentage = 0;
            let coveredLines = 0;
            let totalLines = 0;
            
            if (filePath) {
              const fileData = coverage[filePath];
              const lines = fileData.lines;
              totalLines = lines.filter(line => line !== null).length;
              coveredLines = lines.filter(line => line && line > 0).length;
              percentage = totalLines > 0 ? Math.round((coveredLines / totalLines) * 100 * 100) / 100 : 0;
            }
            
            const status = percentage >= 70 ? '✅' : '❌';
            if (percentage < 70) allPassed = false;
            
            comment += `| \`${file}\` | ${percentage}% (${coveredLines}/${totalLines}) | ${status} |\n`;
          }
          
          comment += '\n';
          comment += `**Minimum Required Coverage:** 70%\n`;
          comment += `**Overall Status:** ${allPassed ? '✅ All files meet coverage requirements' : '❌ Some files need more tests'}\n`;
          
          // Post comment
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });