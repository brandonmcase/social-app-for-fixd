components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token for authentication. 

        Real JWT tokens are generated upon successful login/registration and contain user information.
        Tokens expire after 24 hours and must be included in the Authorization header.

        Example: `eyJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjoxLCJlbWFpbCI6InRlc3RAZXhhbXBsZS5jb20iLCJ1c2VybmFtZSI6InRlc3R1c2VyIiwiZXhwIjoxNzM2NDQ4MDAwLCJpYXQiOjE3MzYzNjE2MDB9.example_signature`

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          description: User ID
        email:
          type: string
          format: email
          description: User's email address
        username:
          type: string
          description: User's username
      required:
        - id
        - email
        - username

    Post:
      type: object
      properties:
        id:
          type: integer
          description: Post ID
          example: 1
        title:
          type: string
          description: Post title
          example: "My Amazing Post"
        body:
          type: string
          description: Post content
          example: "This is the content of my post."
        user_id:
          type: integer
          description: ID of the post author
          example: 1
        username:
          type: string
          description: Username of the post author
          example: "alpha"
        deleted_at:
          type: string
          nullable: true
          description: Soft deletion timestamp
          example: null
        view_count:
          type: integer
          description: Number of times the post has been viewed
          example: 15
        metadata:
          type: object
          description: Additional metadata for the post
          example: {}
        jsonb:
          type: object
          description: JSONB data field
          example: {}
        average_rating:
          type: string
          description: Average rating of the post
          example: "3.5"
        rating_count:
          type: integer
          description: Number of ratings received
          example: 2
        created_at:
          type: string
          format: date-time
          description: When the post was created
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: When the post was last updated
          example: "2024-01-15T10:30:00Z"
      required:
        - id
        - title
        - body
        - user_id
        - username
        - view_count
        - created_at

    Rating:
      type: object
      properties:
        id:
          type: integer
          description: Rating ID
          example: 1
        user_id:
          type: integer
          description: ID of the user who created the rating
          example: 1
        post_id:
          type: integer
          description: ID of the post being rated
          example: 1
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Rating value (1-5 stars)
          example: 4
        created_at:
          type: string
          format: date-time
          description: When the rating was created
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: When the rating was last updated
          example: "2024-01-15T10:30:00Z"
      required:
        - id
        - user_id
        - post_id
        - rating
        - created_at
        - updated_at

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Error code
            message:
              type: string
              description: Error message
            details:
              type: object
              description: Additional error details
              additionalProperties:
                type: array
                items:
                  type: string
      required:
        - error

tags:
  - name: Authentication
    description: User authentication and management endpoints
  - name: Timeline
    description: Activity timeline endpoints for viewing recent posts from all users
  - name: Posts
    description: Post management endpoints for creating, reading, updating, and deleting posts
  - name: Ratings
    description: Rating management endpoints for creating, reading, updating, and deleting post ratings
  - name: Search
    description: Searches active posts (soft-deleted excluded) using PostgreSQL full-text
