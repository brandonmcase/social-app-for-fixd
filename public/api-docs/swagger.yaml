openapi: 3.0.1
info:
  title: Social App for Fixd API
  description: |
    API documentation for the Social App for Fixd.

    This API provides endpoints for user registration, authentication, user management, post management, and rating management.
    All endpoints return JSON responses and use JWT tokens for authentication.
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.socialappforfixd.com
    description: Production server

paths:
  /api/v1/auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Creates a new user account with email, username, and password
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                      example: user@example.com
                      description: User's email address
                    username:
                      type: string
                      minLength: 1
                      maxLength: 50
                      pattern: "^[a-zA-Z0-9_]+$"
                      example: username
                      description: Unique username (alphanumeric and underscores only)
                    password:
                      type: string
                      minLength: 8
                      maxLength: 128
                      example: password123
                      description: User's password
                    password_confirmation:
                      type: string
                      minLength: 8
                      maxLength: 128
                      example: password123
                      description: Password confirmation (must match password)
                  required:
                    - email
                    - username
                    - password
                    - password_confirmation
            examples:
              valid_user:
                summary: Valid user registration
                value:
                  user:
                    email: newuser@example.com
                    username: newuser
                    password: password123
                    password_confirmation: password123
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                        description: User ID
                      email:
                        type: string
                        example: user@example.com
                        description: User's email
                      username:
                        type: string
                        example: username
                        description: User's username
              examples:
                success:
                  summary: Successful registration
                  value:
                    data:
                      id: 1
                      email: newuser@example.com
                      username: newuser
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: validation_error
                      message:
                        type: string
                        example: Invalid registration
                      details:
                        type: object
                        additionalProperties:
                          type: array
                          items:
                            type: string
              examples:
                validation_error:
                  summary: Validation errors
                  value:
                    error:
                      code: validation_error
                      message: Invalid registration
                      details:
                        email: ["can't be blank", "is invalid"]
                        username:
                          [
                            "can't be blank",
                            "is too short (minimum is 1 character)",
                          ]
                        password: ["is too short (minimum is 8 characters)"]

  /api/v1/auth/sign_in:
    post:
      tags:
        - Authentication
      summary: Sign in user
      description: Authenticates a user and returns a JWT token
      operationId: signInUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                      example: user@example.com
                      description: User's email address
                    password:
                      type: string
                      example: password123
                      description: User's password
                  required:
                    - email
                    - password
            examples:
              valid_credentials:
                summary: Valid credentials
                value:
                  user:
                    email: user@example.com
                    password: password123
      responses:
        "200":
          description: User signed in successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                        description: User ID
                      email:
                        type: string
                        example: user@example.com
                        description: User's email
                      username:
                        type: string
                        example: username
                        description: User's username
                  token:
                    type: string
                    example: jwt_token_placeholder_1
                    description: JWT token for authentication
              examples:
                success:
                  summary: Successful sign in
                  value:
                    data:
                      id: 1
                      email: user@example.com
                      username: username
                    token: jwt_token_placeholder_1
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: authentication_error
                      message:
                        type: string
                        example: Invalid email or password
              examples:
                invalid_credentials:
                  summary: Invalid credentials
                  value:
                    error:
                      code: authentication_error
                      message: Invalid email or password

  /api/v1/auth/sign_out:
    delete:
      tags:
        - Authentication
      summary: Sign out user
      description: Signs out the current user (token becomes invalid)
      operationId: signOutUser
      responses:
        "204":
          description: User signed out successfully
          content:
            application/json:
              schema:
                type: object
                example: {}

  /api/v1/auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user
      description: Returns the current authenticated user information
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User information retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                        description: User ID
                      email:
                        type: string
                        example: user@example.com
                        description: User's email
                      username:
                        type: string
                        example: username
                        description: User's username
              examples:
                success:
                  summary: Current user info
                  value:
                    data:
                      id: 1
                      email: user@example.com
                      username: username
        "401":
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: unauthorized
                      message:
                        type: string
                        example: Not authenticated
              examples:
                unauthorized:
                  summary: Unauthorized
                  value:
                    error:
                      code: unauthorized
                      message: Not authenticated

  /api/v1/timeline:
    get:
      tags:
        - Timeline
      summary: Get activity timeline
      description: |
        Returns a paginated timeline of recent posts from all users, sorted by creation time (newest first).
        Includes post author information, average rating, and rating count.
        Supports filtering by minimum average rating.
      operationId: getTimeline
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          description: Number of posts per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: min_rating
          in: query
          description: Minimum average rating filter (1.0-5.0)
          required: false
          schema:
            type: number
            minimum: 1.0
            maximum: 5.0
            example: 4.0
      responses:
        "200":
          description: Timeline retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    title:
                      type: string
                      example: "Amazing Post Title"
                    body:
                      type: string
                      example: "This is the post content..."
                    view_count:
                      type: integer
                      example: 42
                    average_rating:
                      type: string
                      example: "4.5"
                    rating_count:
                      type: integer
                      example: 8
                    created_at:
                      type: string
                      format: date-time
                      example: "2024-01-15T10:30:00Z"
                    username:
                      type: string
                      example: "john_doe"
                    user:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        username:
                          type: string
                          example: "john_doe"
        "401":
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: unauthorized
                      message:
                        type: string
                        example: Invalid or missing token

  /api/v1/search:
    get:
      tags:
        - Search
      summary: Full-text search on posts
      description: |
        Searches active posts (soft-deleted excluded) using PostgreSQL full-text
        search with weighted ranking. Results are paginated and optionally
        filterable by minimum average rating.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Search query. Supports quotes, AND/OR, and minus using `websearch_to_tsquery`.
          example: '"hello world" OR greetings -farewell'
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: per_page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: min_rating
          required: false
          schema:
            type: number
            format: float
            minimum: 0
            maximum: 5
          description: Filter out posts with avg_rating below this value.
          example: 4
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
              examples:
                sample:
                  value:
                    data:
                      - id: 42
                        title: "Hello world"
                        body: "This is my first post"
                        created_at: "2025-09-10T15:30:00Z"
                        view_count: 12
                        avg_rating: 4.5
                        ratings_count: 3
                        author:
                          id: 20
                          username: testuser1
                        rank: 0.2345
                    meta:
                      q: "hello"
                      page: 1
                      per_page: 20
                      total_pages: 1
                      total_count: 1
                      min_rating: null
        "400":
          description: Missing or invalid query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missing_query:
                  value:
                    error:
                      code: bad_request
                      message: "Missing search query"
        "401":
          description: Unauthorized (missing/invalid token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/posts:
    get:
      tags:
        - Posts
      summary: List all posts
      description: Returns a paginated list of all active posts
      operationId: listPosts
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          description: Number of posts per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: language
          in: query
          schema: { type: string }
          description: "Filter by metadata.lang (e.g., 'en')"
        - name: tag
          in: query
          schema: { type: string }
          description: "Filter by presence of a tag in metadata.tags[]"
        - name: featured
          in: query
          schema: { type: boolean }
          description: "Filter posts where metadata.featured = true"
        - name: min_score
          in: query
          schema: { type: number, format: float }
          description: "Filter posts with metadata.score >= min_score"
      responses:
        "200":
          description: Posts retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    title:
                      type: string
                      example: "My First Post"
                    body:
                      type: string
                      example: "This is the content of my first post."
                    username:
                      type: string
                      example: "alpha"
                    view_count:
                      type: integer
                      example: 15
                    average_rating:
                      type: string
                      example: "3.5"
                    rating_count:
                      type: integer
                      example: 2
                    created_at:
                      type: string
                      format: date-time
                      example: "2024-01-15T10:30:00Z"
              examples:
                success:
                  summary: List of posts
                  value:
                    - id: 1
                      title: "My First Post"
                      body: "This is the content of my first post."
                      username: "alpha"
                      view_count: 15
                      average_rating: "3.5"
                      rating_count: 2
                      created_at: "2024-01-15T10:30:00Z"
        "401":
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: unauthorized
                      message:
                        type: string
                        example: Invalid or missing token

    post:
      tags:
        - Posts
      summary: Create a new post
      description: Creates a new post for the authenticated user
      operationId: createPost
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                post:
                  type: object
                  properties:
                    title:
                      type: string
                      minLength: 1
                      maxLength: 100
                      example: "My Amazing Post"
                      description: Post title
                    body:
                      type: string
                      minLength: 1
                      maxLength: 1000
                      example: "This is the content of my post. It can be quite long and detailed."
                      description: Post content
                    metadata:
                      type: object
                      description: "Arbitrary post metadata (JSONB). Common keys: lang, tags[], flags{featured}, score"
                      additionalProperties: true
                  required:
                    - title
                    - body
            examples:
              valid_post:
                summary: Valid post creation
                value:
                  post:
                    title: "My Amazing Post"
                    body: "This is the content of my post. It can be quite long and detailed."
      responses:
        "201":
          description: Post created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  title:
                    type: string
                    example: "My Amazing Post"
                  body:
                    type: string
                    example: "This is the content of my post. It can be quite long and detailed."
                  user_id:
                    type: integer
                    example: 1
                  deleted_at:
                    type: string
                    nullable: true
                    example: null
                  view_count:
                    type: integer
                    example: 0
                  metadata:
                    type: object
                    example: {}
                  jsonb:
                    type: object
                    example: {}
                  average_rating:
                    type: string
                    example: "0.0"
                  rating_count:
                    type: integer
                    example: 0
                  created_at:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:30:00Z"
                  updated_at:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:30:00Z"
              examples:
                success:
                  summary: Created post
                  value:
                    id: 1
                    title: "My Amazing Post"
                    body: "This is the content of my post. It can be quite long and detailed."
                    user_id: 1
                    deleted_at: null
                    view_count: 0
                    metadata: {}
                    jsonb: {}
                    average_rating: "0.0"
                    rating_count: 0
                    created_at: "2024-01-15T10:30:00Z"
                    updated_at: "2024-01-15T10:30:00Z"
        "401":
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: unauthorized
                      message:
                        type: string
                        example: Invalid or missing token
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: array
                    items:
                      type: string
              examples:
                validation_error:
                  summary: Validation errors
                  value:
                    error: ["Title can't be blank"]

  /api/v1/posts/{id}:
    get:
      tags:
        - Posts
      summary: Get a specific post
      description: Returns a specific post by ID and increments its view count
      operationId: getPost
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Post ID
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Post retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  title:
                    type: string
                    example: "My Amazing Post"
                  body:
                    type: string
                    example: "This is the content of my post. It can be quite long and detailed."
                  username:
                    type: string
                    example: "alpha"
                  view_count:
                    type: integer
                    example: 16
                  average_rating:
                    type: string
                    example: "3.5"
                  rating_count:
                    type: integer
                    example: 2
                  created_at:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:30:00Z"
              examples:
                success:
                  summary: Post details
                  value:
                    id: 1
                    title: "My Amazing Post"
                    body: "This is the content of my post. It can be quite long and detailed."
                    username: "alpha"
                    view_count: 16
                    average_rating: "3.5"
                    rating_count: 2
                    created_at: "2024-01-15T10:30:00Z"
        "401":
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: unauthorized
                      message:
                        type: string
                        example: Invalid or missing token
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: not_found
                      message:
                        type: string
                        example: Not found
              examples:
                not_found:
                  summary: Post not found
                  value:
                    error:
                      code: not_found
                      message: Not found

    patch:
      tags:
        - Posts
      summary: Update a post
      description: Updates a post (only by the post owner)
      operationId: updatePost
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Post ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                post:
                  type: object
                  properties:
                    title:
                      type: string
                      minLength: 1
                      maxLength: 100
                      example: "Updated Post Title"
                      description: Post title
                    body:
                      type: string
                      minLength: 1
                      maxLength: 1000
                      example: "Updated post content with new information."
                      description: Post content
            examples:
              valid_update:
                summary: Valid post update
                value:
                  post:
                    title: "Updated Post Title"
                    body: "Updated post content with new information."
      responses:
        "200":
          description: Post updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                    example: 1
                  title:
                    type: string
                    example: "Updated Post Title"
                  body:
                    type: string
                    example: "Updated post content with new information."
                  id:
                    type: integer
                    example: 1
                  deleted_at:
                    type: string
                    nullable: true
                    example: null
                  view_count:
                    type: integer
                    example: 1
                  metadata:
                    type: object
                    example: {}
                  jsonb:
                    type: object
                    example: {}
                  average_rating:
                    type: string
                    example: "0.0"
                  rating_count:
                    type: integer
                    example: 0
                  created_at:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:30:00Z"
                  updated_at:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:30:13Z"
              examples:
                success:
                  summary: Updated post
                  value:
                    user_id: 1
                    title: "Updated Post Title"
                    body: "Updated post content with new information."
                    id: 1
                    deleted_at: null
                    view_count: 1
                    metadata: {}
                    jsonb: {}
                    average_rating: "0.0"
                    rating_count: 0
                    created_at: "2024-01-15T10:30:00Z"
                    updated_at: "2024-01-15T10:30:13Z"
        "401":
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: unauthorized
                      message:
                        type: string
                        example: Invalid or missing token
        "403":
          description: Forbidden - user can only update their own posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: forbidden
                      message:
                        type: string
                        example: You are not authorized to access this page.
              examples:
                forbidden:
                  summary: Forbidden
                  value:
                    error:
                      code: forbidden
                      message: You are not authorized to access this page.
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: not_found
                      message:
                        type: string
                        example: Not found
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: array
                    items:
                      type: string

    delete:
      tags:
        - Posts
      summary: Delete a post
      description: Soft deletes a post (only by the post owner)
      operationId: deletePost
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Post ID
          schema:
            type: integer
            example: 1
      responses:
        "204":
          description: Post deleted successfully
          content: {}
        "401":
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: unauthorized
                      message:
                        type: string
                        example: Invalid or missing token
        "403":
          description: Forbidden - user can only delete their own posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: forbidden
                      message:
                        type: string
                        example: You are not authorized to access this page.
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: not_found
                      message:
                        type: string
                        example: Not found

  /api/v1/posts/{post_id}/rating:
    get:
      tags:
        - Ratings
      summary: Get user's rating for a post
      description: Returns the current user's rating for a specific post
      operationId: getPostRating
      security:
        - BearerAuth: []
      parameters:
        - name: post_id
          in: path
          required: true
          description: Post ID
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Rating retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  user_id:
                    type: integer
                    example: 1
                  post_id:
                    type: integer
                    example: 1
                  rating:
                    type: integer
                    minimum: 1
                    maximum: 5
                    example: 4
                  created_at:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:30:00Z"
                  updated_at:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:30:00Z"
              examples:
                success:
